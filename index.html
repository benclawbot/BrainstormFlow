
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainstormFlow - Creative Brainstorming Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .font-display {
            font-family: 'Space+Grotesk', sans-serif;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Markdown Styling */
        .markdown-content h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #a5b4fc; }
        .markdown-content h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid rgba(165, 180, 252, 0.2); }
        .markdown-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content li { margin-bottom: 0.5rem; }
        .markdown-content p { margin-bottom: 1rem; line-height: 1.6; }
        .markdown-content strong { color: #818cf8; }
        .markdown-content code { background: rgba(0,0,0,0.3); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        
        /* Custom Badge styles for the labels mentioned in prompt */
        .label-strong { background: #312e81; color: #c7d2fe; border: 1px solid #4338ca; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .label-wild { background: #581c87; color: #e9d5ff; border: 1px solid #7e22ce; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .label-quick-win { background: #064e3b; color: #a7f3d0; border: 1px solid #059669; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .label-needs-more { background: #713f12; color: #fef08a; border: 1px solid #ca8a04; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
